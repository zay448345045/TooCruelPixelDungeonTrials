### tags
tcpd.modifiertag.positive=正面
tcpd.modifiertag.positive_desc=大部分有益的修饰符
tcpd.modifiertag.easy=简单
tcpd.modifiertag.easy_desc=低难度修饰符（比原版游戏挑战更简单）
tcpd.modifiertag.normal=普通
tcpd.modifiertag.normal_desc=中等难度修饰符（与原版游戏挑战相似）
tcpd.modifiertag.hard=困难
tcpd.modifiertag.hard_desc=高难度修饰符（比原版游戏挑战更难）
tcpd.modifiertag.extreme=极限
tcpd.modifiertag.extreme_desc=极端难度修饰符。组合多个此类修饰符需谨慎，它们可能导致游戏无法通关
tcpd.modifiertag.enemy=敌人
tcpd.modifiertag.enemy_desc=影响敌人行为或外观的修饰符
tcpd.modifiertag.hero=英雄
tcpd.modifiertag.hero_desc=影响英雄与世界或物品交互的修饰符
tcpd.modifiertag.combat=战斗
tcpd.modifiertag.combat_desc=直接影响战斗过程的修饰符（伤害数值、攻击特效等）
tcpd.modifiertag.level=关卡
tcpd.modifiertag.level_desc=影响关卡生成或布局的修饰符
tcpd.modifiertag.item=物品
tcpd.modifiertag.item_desc=影响物品生成、行为或可用性的修饰符
tcpd.modifiertag.new_stuff=新内容
tcpd.modifiertag.new_stuff_desc=为游戏添加新内容或机制的修饰符
tcpd.modifiertag.rng=随机性
tcpd.modifiertag.rng_desc=干扰随机事件或游戏生成的修饰符
tcpd.modifiertag.dungeon=地下城
tcpd.modifiertag.dungeon_desc=影响地下城进度、关卡顺序、固定物品或地标的修饰符
tcpd.modifiertag.environment=环境
tcpd.modifiertag.environment_desc=影响环境（如水、火、草地）的修饰符
tcpd.modifiertag.traps=陷阱
tcpd.modifiertag.traps_desc=影响陷阱的修饰符
tcpd.modifiertag.mimics=宝箱怪
tcpd.modifiertag.mimics_desc=与宝箱怪互动的修饰符（游戏中居然有这么多宝箱怪）
tcpd.modifiertag.boss=BOSS
tcpd.modifiertag.boss_desc=影响 BOSS 战或其掉落奖励的修饰符
tcpd.modifiertag.silly=恶搞
tcpd.modifiertag.silly_desc=不该被认真对待的、或者纯粹恶搞的修饰符
tcpd.modifiertag.addon=扩展
tcpd.modifiertag.addon_desc=需要配合其他修饰符才能启用的修饰符
### modifiers
tcpd.modifier.cardinal_disability=正交残障
tcpd.modifier.cardinal_disability_desc=- 敌人仅在英雄的四个正方向上时才会受到伤害。
tcpd.modifier.racing_the_death=死神竞赛
tcpd.modifier.racing_the_death_desc=我不是专家，但打破那面诅咒之镜是个非常糟糕的主意……\n\n- 一道暗能量轨迹会追踪你，如果你在同一个位置停留超过 3 个回合，它会伤害你\n- 致命的二重身会在 4 步之后跟随你
tcpd.modifier.horde=部落
tcpd.modifier.horde_desc=特别优惠！买一送一！\n\n- 敌人数量翻倍
tcpd.modifier.invasion=入侵
tcpd.modifier.invasion_desc=深层的怪物正在入侵高层！\n\n- 怪物生成深度上移 2 层（例如监狱怪物出现在第 4 层等）\n- 每个章节的第 3 层有几率生成下一章节的怪物
tcpd.modifier.great_migration=大迁徙
tcpd.modifier.great_migration_desc=是时候更新你的图鉴了！\n\n- 怪物生成深度上移整整一个章节（例如监狱怪物出现在第 1 层等）\n- 下水道第 1 层不受影响
tcpd.modifier.mutagen=诱变剂
tcpd.modifier.mutagen_desc=它们比你想象的要多\n\n- 生成稀有怪物变种的几率极高
tcpd.modifier.evolution=进化
tcpd.modifier.evolution_desc=见鬼去吧，达尔文！\n\n- 稀有怪物变种生成率提升至 100%\n- 禁用鼠头骨
tcpd.modifier.rotten_luck=霉运
tcpd.modifier.rotten_luck_desc=你不该烧掉那些四叶草！\n\n- 英雄的伤害结算倾向于最小值\n- 禁用十三叶三叶草
tcpd.modifier.arrowhead=箭头
tcpd.modifier.arrowhead_desc=你确定这是个好主意吗？\n\n- 击杀怪物获得“箭头”层数。\n- 每层箭头使你造成伤害增加 10%，受到的伤害增加 30%。\n- 若 20 回合内未击杀敌人，箭头层数每 20 回合衰减 1 层
tcpd.modifier.thunderstruck=雷击
tcpd.modifier.thunderstruck_desc=枪炮的雷鸣\n将我撕裂\n你已被\n_雷击_\n\n- 你初始拥有 9001 层箭头\n- 箭头层数衰减时间变为每层 420 回合\n- 护盾药水使你在 3 回合内完全免疫伤害
tcpd.modifier.second_try=第二次尝试
tcpd.modifier.second_try_desc=你不是第一个挑战这座地下城的人，可惜补给品少得可怜\n\n- 几乎没有随机掉落\n- 特殊房间解锁但大都空空如也
tcpd.modifier.crystal_shelter=水晶庇护所
tcpd.modifier.crystal_shelter_desc=- 所有敌人拥有水晶屏障，可抵御微弱伤害，但会被强力攻击打破\n- 水晶屏障在破碎后 10 回合内重组
tcpd.modifier.crystal_blood=晶化之血
tcpd.modifier.crystal_blood_desc=- 非 BOSS 敌人有一次免疫致命一击的机会，并获得 5 层水晶屏障
tcpd.modifier.deeper_danger=深层危机
tcpd.modifier.deeper_danger_desc=- 在计算效果缩放时，地下城层数被视为深 10 层
tcpd.modifier.head_start=先发优势
tcpd.modifier.head_start_desc=- 下水道第 1 层必定生成 2 个升级卷轴和 1 个力量药水\n- 这些奖励物品将从后续层数中移除，因此地下城总产出量保持不变
tcpd.modifier.prison_express=监狱快线
tcpd.modifier.prison_express_desc=你感觉被坑了，但谁在乎呢！你比其他探险者领先了整整一个区域！\n\n- 到达第 2 层后，你将被快线接走并送往监狱\n- 在获得安多护身符之前，你无法返回下水道\n- 先发优势效果增强，保证掉落 3 个卷轴和 2 个药水
tcpd.modifier.prison_express_transition_blocked=车票概不退款！
tcpd.modifier.blindness=失明
tcpd.modifier.blindness_desc=当失去视力时，只能依靠触觉\n\n- 你需要沿着墙壁走来确定方向\n- 开阔空间会让你迷失
tcpd.modifier.bloodbag=血袋
tcpd.modifier.bloodbag_desc=50% 人类，50% 血液史莱姆\n\n- 不会直接受到伤害，而是将所受伤害的 50% 转化为流血效果
tcpd.modifier.revenge=复仇之怒
tcpd.modifier.revenge_desc=好吧，这下你闯祸了。现在所有人都恨你！\n\n- 对怪物造成的溢出伤害会添加到其视线内其他怪物的伤害中
tcpd.modifier.revenge_fury=复仇狂暴
tcpd.modifier.revenge_fury_desc=撕碎并吞噬！\n\n- 当敌人在目睹其他敌人死亡后的 10 回合内，造成双倍伤害，并受到 20% 额外伤害（可叠加）
tcpd.modifier.prepared_enemies=有备而来的敌人
tcpd.modifier.prepared_enemies_desc=“蝙蝠侠”的合格继任者\n\n- 无法进行偷袭\n- 下水道蛇每条吃了两只老鼠
tcpd.modifier.repeater=连发
tcpd.modifier.repeater_desc=我TM还要再来一次\n\n- 陷阱在触发后不会解除
tcpd.modifier.duplicator=复制机
tcpd.modifier.duplicator_desc=持续生产！\n\n- 每当一个陷阱即将解除时，会在关卡某处创建两个它的副本
tcpd.modifier.body_traps=临别礼物
tcpd.modifier.body_traps_desc=来自怪物的爱\n\n- 怪物死亡时会留下一个陷阱
tcpd.modifier.extreme_caution=极端谨慎
tcpd.modifier.extreme_caution_desc=你进过雷区吗？\n\n- 陷阱数量变为 4 倍
tcpd.modifier.colosseum=竞技场
tcpd.modifier.colosseum_desc=斗兽场是位于意大利罗马市中心的一座椭圆形圆形剧场……尽管历经沧桑，它仍是现存最大的古代圆形剧场\n- 每一个敌人都是冠军
tcpd.modifier.patron_saints=圣徒庇佑
tcpd.modifier.patron_saints_desc=受封过程快得惊人\n\n- 当敌人死亡时，它们会留下一个区域来强化其他敌人\n- 同一个格子上的多个区域效果最多可叠加 8 次
tcpd.modifier.persistent_saints=固执圣徒
tcpd.modifier.persistent_saints_desc=洲际弹道圣徒\n\n- 当敌人死亡时，英雄所在位置会产生一个额外的圣徒光环
tcpd.modifier.holy_water=圣水
tcpd.modifier.holy_water_desc=谁知道矮人王竟然是位大祭司？\n\n- 地下城内所有的水都附带圣徒光环效果
tcpd.modifier.intoxication=醉酒
tcpd.modifier.intoxication_desc=毕竟它们本质上就是毒品\n\n- 饮用药水会使你醉酒
tcpd.modifier.plague=瘟疫
tcpd.modifier.plague_desc=这座地下城被感染了！\n\n- 受到伤害会使你醉酒
tcpd.modifier.toxic_water=糟糕的管道
tcpd.modifier.toxic_water_desc=所有的水管工都被老鼠吃了\n\n- 站在水中会使你醉酒
tcpd.modifier.certainty_of_steel=钢铁意志
tcpd.modifier.certainty_of_steel_desc=当我理解了肉体的软弱，我就厌恶它。我渴望钢铁的强度与确定性\n\n- 生命值锁定为 1\n- 任何治疗效果转换为护盾。\n- 生命转护盾比率初始为 1:1，当护盾超过最大生命值后，比率会变差，最高至最大生命值的两倍时完全停止收益。\n- 禁用盐块\n- 禁用饥饿与自然恢复
tcpd.modifier.golden_colossus=黄金巨像
tcpd.modifier.golden_colossus_desc=作为贪婪的惩罚，莱昂纳多被投入一锅熔化的黄金中，但他依然屹立不倒\n\n- 护盾基于黄金数量\n- 失去护盾时会损失黄金\n- 治疗量会以不佳的比率转换为黄金，且比率随章节推进而改善\n- 禁用大师盗贼臂章
tcpd.modifier.paradox_levelgen=建造悖论
tcpd.modifier.paradox_levelgen_desc=显然施工计划没被遵守\n\n- 所有标准房间和走廊的生成几率相同
tcpd.modifier.retiered=重订阶级
tcpd.modifier.retiered_desc=喝下那瓶月光酒！\n\n- 每种武器类型有 50% 几率生成低 1 阶，25% 几率高 1 阶，5% 几率随机阶级\n- 一种近战武器和一种远程武器将必定生成为 6 阶
tcpd.modifier.untiered=无阶级
tcpd.modifier.untiered_desc=你现在烂醉如泥！\n\n- 所有武器均为 1 阶，但获得等同于原阶级减一的额外升级点数。
tcpd.modifier.unstable_accessories=不稳定饰品
tcpd.modifier.unstable_accessories_desc=那些宝石看起来可不对劲\n\n- 受伤时有几率重置所有已装备的饰品
tcpd.modifier.pandemonium=混乱
tcpd.modifier.pandemonium_desc=你值得信赖的宝剑在你手中扭曲变形，刀刃随之变换不定\n\n- 攻击后有几率重置已装备武器\n- 使用后有几率重置魔杖\n- 使用后有几率重置投掷武器\n- 灵能弓会被重置为随机投掷武器（后续章节武器更好）
tcpd.modifier.barrier_breaker=破障者
tcpd.modifier.barrier_breaker_desc=你讨厌路上的障碍，并以最直接的方式表达这种厌恶\n\n- 你只需移动撞向门即可在 1 回合内将其摧毁
tcpd.modifier.moles=鼹鼠
tcpd.modifier.moles_desc=它们就在你的墙里\n\n- 敌人可以钻透墙壁\n- 若已开启“地下城阁楼”修饰符，所有敌人获得永久飞行能力
tcpd.modifier.loft=地下城阁楼
tcpd.modifier.loft_desc=莱昂纳多：看到了吗？现在宽敞多了！\n希娅：我没看出区别。\n\n- 墙壁被替换为深渊\n- 你和你的盟友无法看到深渊对面\n- 若已开启“鼹鼠”修饰符，所有敌人获得永久飞行能力
tcpd.modifier.bulky_frame=臃肿躯体
tcpd.modifier.bulky_frame_desc=怪物们变得极其魁梧\n\n- 你和你的盟友无法透过怪物进行视线观察
tcpd.modifier.shrouding_presence=遮蔽存在
tcpd.modifier.shrouding_presence_desc=你看不见我！\n\n- 怪物会阻挡其周围 3x3 区域的视线
tcpd.modifier.sliding=湿滑地板
tcpd.modifier.sliding_desc=为什么怪物们还能正常行走？！\n\n- 你会在水面上滑动\n- 滑过水面后有 20% 几率清除该积水\n- 积水量增加 50%
tcpd.modifier.insomnia=失眠
tcpd.modifier.insomnia_desc=你真觉得能在满是疯狂且睡眠不足怪物的地下城里睡觉吗？\n\n- 敌人出生即清醒\n- 非战斗状态下敌人以双倍速度行动\n- 尝试休息会导致短命的无敌怨灵生成
tcpd.modifier.loot_paradise=掉落天堂
tcpd.modifier.loot_paradise_desc=- 地下城内散落的掉落物变为 11 倍
tcpd.modifier.bombermob=爆炸怪物
tcpd.modifier.bombermob_desc=- 怪物死亡时掉落炸弹\n- 你无法拾取引燃的炸弹\n- 在非 BOSS 层，有 1% 几率生成超新星代替炸弹
tcpd.modifier.bombermob_fuse=这太危险了，碰不得！
tcpd.modifier.constellation=星座
tcpd.modifier.constellation_desc=- 爆炸怪物的超新星触发几率变为 100%\n- 超新星在其范围内的每个格子上炸开一颗随机特殊炸弹
tcpd.modifier.cursed=受诅咒
tcpd.modifier.cursed_desc=有人拿错了把手方向\n\n- 地下城内发现的所有物品均为受诅咒状态
tcpd.modifier.curse_magnet=诅咒磁铁
tcpd.modifier.curse_magnet_desc=不幸的是，连你的背包都受了诅咒\n\n- 你无法丢弃或投掷受诅咒的物品
tcpd.modifier.extermination=歼灭
tcpd.modifier.extermination_desc=贝斯罗·布德金会感到自豪的\n\n- 关卡被封锁，直到消灭你进入该层时所在的所有怪物\n- 掉入坑洞会将你传送到同层随机位置
tcpd.modifier.extermination_lock=关卡已被封锁\n还剩 %s 个目标存活
tcpd.modifier.extermination_lock_last=关卡已被封锁\n只剩最后一个目标存活
tcpd.modifier.extermination_complete=歼灭完成
tcpd.modifier.extermination_second_round=一波 %d 只新害虫已到来，全部消灭它们！
tcpd.modifier.postpaid_loot=后付费掉落
tcpd.modifier.postpaid_loot_desc=希娅：你是不是忘了谈预付款？\n莱昂纳多：抱歉，我没看清小字说明……\n\n- 所有物品都被锁在宝箱里，直到歼灭任务完成
tcpd.modifier.mimics=虚假地下城
tcpd.modifier.mimics_desc=莱昂纳多：往好的方面想，我们再也不用猜哪个宝箱是宝箱怪了\n希娅：闭嘴\n\n- 所有普通宝箱都是弱小的宝箱怪
tcpd.modifier.mimics_all=诺克斯堡
tcpd.modifier.mimics_all_desc=莱昂纳多：更多宝箱意味着更多财宝，对吧？\n希娅：在这种情况下可不是\n\n- 自然生成的物品被弱小宝箱怪持有\n- 自然生成的武器被脆弱的活体雕像持有。
tcpd.modifier.mimics_grind=宝箱怪狂欢派对
tcpd.modifier.mimics_grind_desc=我们来这儿就是为了找乐子，喝个烂醉\n还要赚大把钱\n因为除此之外别无他求\n\n- 弱小宝箱怪现在和黄金宝箱怪一样强，并像普通宝箱怪一样掉落额外奖励
tcpd.modifier.jack_in_a_box=惊喜盒
tcpd.modifier.jack_in_a_box_desc=- 所有怪物都藏在宝箱怪内（包括任何现有的宝箱怪）\n- 当你靠近到 2 格内或攻击其他宝箱怪 3 回合后，宝箱怪会苏醒并开始狩猎
tcpd.modifier.boxed=盒装
tcpd.modifier.boxed_desc=- 每个房间的边缘都挤满了怪物宝箱怪
tcpd.modifier.recursive_hierarchy=递归层级
tcpd.modifier.recursive_hierarchy_desc=- 宝箱怪有 50% 几率藏在更小的宝箱怪里\n- 由宝箱怪生成的怪物会略大一些\n- 最大递归层级随当前章节提升
tcpd.modifier.repopulation=重新繁衍
tcpd.modifier.repopulation_desc=地下城厌恶空无一物\n\n- 当剩余敌人越少时，敌人刷新率越高。\n- 从剩余近 100% 敌人时的 50 回合刷新，到剩余 <10% 敌人时的即时刷新
tcpd.modifier.resurrection=复活
tcpd.modifier.resurrection_desc=对于怪物来说，死亡只是暂时的不便\n\n- 敌人即时刷新
tcpd.modifier.fractal_hive=分形蜂巢
tcpd.modifier.fractal_hive_desc=实验性的地下城技术即将推向市场，允许地下城主生成无限数量的怪物，现在你的任务就是去测试它们！\n\n- 移除怪物生成上限\n- 怪物刷新延迟限制在 25 回合
tcpd.modifier.crooked_die=歪骰子
tcpd.modifier.crooked_die_desc=- 许多随机掷点现在总是给予最大结果\n\n- 副作用包括大房间、更高的伤害掷点等等
tcpd.modifier.crumbled_stairs=崩塌楼梯
tcpd.modifier.crumbled_stairs_desc=- 在获得安多护身符前你无法上升\n- 在获得安多护身符后你无法下降\n- 禁止楼层间传送
tcpd.modifier.crumbled_stairs_no_distractions=你现在不能分心！地表在等待着你！
tcpd.modifier.multiclassing=多重职业
tcpd.modifier.multiclassing_desc=- 天狗面具提供 3 个来自其他职业的随机子职业选择\n- 你将获得所选子职业所属职业的特殊物品
tcpd.modifier.exotic_goods=异域商品
tcpd.modifier.exotic_goods_desc=- 所有药水和卷轴（力量药水和升级卷轴除外）被替换为其对应的异域版本\n- 禁用异域水晶饰品
tcpd.modifier.drought=旱灾
tcpd.modifier.drought_desc=地下城里几乎所有的水都蒸发了……\n\n- 水和草地减少 90%
tcpd.modifier.over_the_edge=边缘之外
tcpd.modifier.over_the_edge_desc=小心别掉下去\n\n- 地下城地面严重崩塌，到处都是深渊
tcpd.modifier.whiplash=鞭笞
tcpd.modifier.whiplash_desc=呼——\n\n- 所有伤害会将受击者击飞至非相邻角色或墙壁的方向（如果没有可见的目标）
tcpd.modifier.casual_approach=随意接触
tcpd.modifier.casual_approach_desc=- 当你第一次见到一个怪物时，它会因为爱与重型钢链的力量被强行拉向你
tcpd.modifier.let_them_rest=让他们安息
tcpd.modifier.let_them_rest_desc=我现在累了，能请你让我待着吗？\n\n- 你在睡觉时处于隐身状态
tcpd.modifier.eternal_flames=永恒之火
tcpd.modifier.eternal_flames_desc=- 地面上的任何火都不会熄灭，但不会蔓延\n- 可燃地块不会烧毁
tcpd.modifier.domain_of_hell=地狱领域
tcpd.modifier.domain_of_hell_desc=- 任何草地都处于燃烧状态\n- 敌人对火属性高度抗性\n- 使用硫磺雕文是个_非常_糟糕的主意\n- 每个关卡入口附近都有免费的水爆术\n- 入口房间的所有草地都被替换为水
tcpd.modifier.crowd_diversity=人群多样性
tcpd.modifier.crowd_diversity_desc=看看这头奶牛有多小！\n\n_-_ 地下城里的敌人拥有随机体型\n\n_-_ 体型决定了他们的攻击和移动速度、防御、闪避以及近战伤害\n\n_-_ BOSS 和小型 BOSS 不受影响
tcpd.modifier.in_your_face=脸贴脸
tcpd.modifier.in_your_face_desc=- 每层入口附近直接有 1-3 个怪物\n- 以这种方式创建的敌人第一回合处于未激活状态，但在下一回合苏醒
tcpd.modifier.perfect_information=完美信息
tcpd.modifier.perfect_information_desc=- 你始终拥有心灵视觉和感知能力\n- 每一层开始时自动激活魔法地图卷轴
tcpd.modifier.safety_buffer=安全缓冲
tcpd.modifier.safety_buffer_desc=希娅：你花了_多少_钱买了这个祝福？！\n\n- 你初始拥有 10 点安全充能\n- 安全充能会在你视野内的任何怪物出现时自动消耗，对其造成一回合的眩晕，并在下一回合造成 10 点伤害