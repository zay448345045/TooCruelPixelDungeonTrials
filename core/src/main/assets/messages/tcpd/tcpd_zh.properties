### actors
#### buffs
tcpd.actors.buffs.racingthedeath.ondeath=你被阴影吞噬了。
tcpd.actors.buffs.racingthedeath.rankings_desc=被阴影吞噬
tcpd.actors.buffs.arrowhead.name=箭头
tcpd.actors.buffs.arrowhead.desc=你正在驾驭闪电！\n\n- 当前层数：%d\n_受到的伤害加成：%d%%*\n_敌人受到的伤害加成：%d%%*
tcpd.actors.buffs.crystalshield.name=水晶屏障
tcpd.actors.buffs.crystalshield.desc=屏障闪烁着力量，反射出你从未见过的维度景象。\n\n- 屏障可抵消弱小伤害，但若所有层数耗尽则会破碎。\n- 屏障最多可抵消 %d 点伤害。
tcpd.actors.buffs.crystalshield.desc_inactive=屏障的碎片正漂浮在周围，试图重组。\n\n- 屏障通常能抵消弱小伤害，但目前已破碎\n- 屏障将在 %s 回合后重组。
tcpd.actors.buffs.crystalshield.blocked=已抵消
tcpd.actors.buffs.crystalshield.shattered=已破碎
tcpd.actors.buffs.crystalshield.restored=已重组
tcpd.actors.buffs.crystalshield.layer_broken=已破裂
tcpd.actors.buffs.crystalshieldlayer.name=水晶层
tcpd.actors.buffs.crystalshieldlayer.desc=水晶屏障的一层。\n\n- 完全抵消一次屏障本身无法抵消的伤害。\n- 由于屏障的体积，几乎无法闪避敌人的攻击。\n- 若所有层数耗尽，水晶屏障将破碎。
tcpd.actors.buffs.crystalshield$layer.desc_standalone=一层薄薄的晶体膜，引诱着你去触碰它。\n\n- 完全抵消一次伤害。\n- 由于屏障的体积，几乎无法闪避敌人的攻击。
tcpd.actors.buffs.crystalshielddeathmarker.name=晶化之血
tcpd.actors.buffs.crystalshielddeathmarker.desc=这具躯体已无生命力，但闪烁的空壳依然屹立。\n\n- 受影响角色在失去所有水晶层后将死亡。
tcpd.actors.buffs.revengerage.name=复仇之怒
tcpd.actors.buffs.revengerage.desc=你不该杀了它的朋友！\n\n- 当前伤害加成：%d
tcpd.actors.buffs.revengefury.name=复仇狂暴
tcpd.actors.buffs.revengefury.desc=这个怪物对你_非常_愤怒！唯一的好消息是它很快就会力竭\n\n- 该怪物造成双倍伤害，并受到 20%% 额外伤害（BOSS除外）\n- 剩余回合数：%s
tcpd.actors.buffs.patronsaints.name=圣徒光环
tcpd.actors.buffs.patronsaints.desc=被击败的敌人为它的盟友留下了祝福。\n\n-%1d 名圣徒正在保护该敌人，赋予其 %2s%% 攻击加成和 %3$s%% 伤害抗性
tcpd.actors.buffs.intoxication.name=醉酒
tcpd.actors.buffs.intoxication.desc=剩余醉酒回合 *%1$s*\n当前等级 *%2$s*
tcpd.actors.buffs.intoxication.t_none=安全
tcpd.actors.buffs.intoxication.t_light=轻微
tcpd.actors.buffs.intoxication.t_medium=中度
tcpd.actors.buffs.intoxication.t_heavy=重度
tcpd.actors.buffs.intoxication.t_deadly=致命
tcpd.actors.buffs.intoxication.notify_light=你感到轻微醉酒。
tcpd.actors.buffs.intoxication.notify_medium=你感到醉意上涌。
tcpd.actors.buffs.intoxication.notify_heavy=你感到再喝下去恐怕会有生命危险。
tcpd.actors.buffs.intoxication.notify_deadly=你感到快要酒精中毒而死了。
tcpd.actors.buffs.holdingheap.name=背包
tcpd.actors.buffs.holdingheap.desc_both=一个装有 %d 件物品和 %d 个神秘袋的背包
tcpd.actors.buffs.holdingheap.desc_items=一个装有 %d 件物品的背包
tcpd.actors.buffs.holdingheap.desc_heaps=一个装有 %d 个神秘袋的背包
tcpd.actors.buffs.holdingheap.desc_empty=一个空背包
tcpd.actors.buffs.prisonexpress.announce_3=女士们，先生们！非常冷酷地欢迎乘坐监狱快线！
tcpd.actors.buffs.prisonexpress.announce_2=请收起你们的翅膀，确保自己稳固在地面上。
tcpd.actors.buffs.prisonexpress.announce_1=我们现已发车，下一站是监狱！
tcpd.actors.buffs.prisonexpress.landing=监狱快线已抵达终点。祝您在监狱里度过愉快的一段时光，并期待再次相见！
tcpd.actors.buffs.resizing.name=已缩放
tcpd.actors.buffs.resizing.desc=这个生物的体型很不寻常\n\n- 生物大小为 %1d%%，获得 x%2s 攻击力、x%3s 防御力、x%4s 闪避率、x%5s 生命值和 x%6s 移动速度
tcpd.actors.buffs.safetybuffer.name=安全缓冲
tcpd.actors.buffs.safetybuffer.desc=你受到远古魔法之风的保护。\n\n- 你还剩下 %d 点安全充能。
#### blobs
tcpd.actors.blobs.patronsaintsblob.desc=空气中弥漫着圣徒的祝福。
tcpd.actors.blobs.exterminationitemlock.desc=该物品将在歼灭任务完成后解锁。
