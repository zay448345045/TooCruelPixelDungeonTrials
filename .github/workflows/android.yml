name: Android CI

on:
  workflow_dispatch:      # 允许手动点击按钮触发
    inputs:
      branch:
        description: '选择构建的分支'
        required: true
        default: 'main2'
        type: choice
#  push:
#    branches: [ "main2" ]
#    paths:
#     - 'action.on' # 只有 特定 文件的更改才构建
#    branches: [ "main" ]
#  pull_request:
#    branches: [ "main2" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: set up JDK 
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: gradle
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: ./gradlew assembleDebug
    - uses: actions/upload-artifact@v4
      with:
        name: my-artifact
        path: |
         **/*.apk
         **/*.aab
         **/*.ipa
         **/*.app
         **/*.xcarchive
         **/*.exe
         **/*.AppImage
         **/*..jar
